<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="860" viewBox="0 0 1080 860" role="img" aria-labelledby="title desc">
  <title id="title">Linux packet path, queue layers, and eBPF hooks</title>
  <desc id="desc">A simplified map of the Linux networking stack showing the application, Socket and TCP, qdisc and TC, NIC queues, physical network, receive path, eBPF hook points, observability, and congestion signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4eee6"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <style>
      .title { font: 700 36px Georgia, serif; fill: #1f2a33; }
      .subtitle { font: 500 20px Arial, sans-serif; fill: #4a5b66; }
      .section { font: 700 20px Arial, sans-serif; fill: #51616c; letter-spacing: 0.14em; text-transform: uppercase; }
      .head { font: 700 28px Georgia, serif; fill: #ffffff; }
      .body { font: 500 19px Arial, sans-serif; fill: #ecf4fa; }
      .body-dark { font: 500 19px Arial, sans-serif; fill: #33424c; }
      .small-dark { font: 500 17px Arial, sans-serif; fill: #44545e; }
      .pill { font: 500 18px Arial, sans-serif; }
      .card { rx: 20; ry: 20; stroke: #21313d; stroke-opacity: 0.18; stroke-width: 2; }
      .arrow { stroke: #253540; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#253540" />
    </marker>
  </defs>

  <rect width="1080" height="860" fill="url(#bg)" />

  <text x="70" y="74" class="title">Where packets queue, and where eBPF can observe them</text>
  <text x="70" y="112" class="subtitle">Transport sets sending pressure, queueing layers stage packets,</text>
  <text x="70" y="138" class="subtitle">and hooks expose the signals that tell you where congestion really lives.</text>

  <text x="70" y="160" class="section">Packet path</text>

  <rect x="60" y="190" width="210" height="122" class="card" fill="#24304a" />
  <text x="165" y="242" class="head" text-anchor="middle">Application</text>
  <text x="165" y="274" class="body" text-anchor="middle">send, recv, io_uring</text>

  <rect x="300" y="190" width="210" height="122" class="card" fill="#2f6079" />
  <text x="405" y="242" class="head" text-anchor="middle">Socket / TCP</text>
  <text x="405" y="274" class="body" text-anchor="middle">cwnd, pacing, RTT</text>

  <rect x="540" y="190" width="210" height="122" class="card" fill="#617856" />
  <text x="645" y="242" class="head" text-anchor="middle">qdisc / TC</text>
  <text x="645" y="274" class="body" text-anchor="middle">fq, fq_codel, shaping</text>

  <rect x="780" y="190" width="240" height="122" class="card" fill="#956232" />
  <text x="900" y="242" class="head" text-anchor="middle">NIC Queues</text>
  <text x="900" y="270" class="body" text-anchor="middle">TX and RX rings,</text>
  <text x="900" y="294" class="body" text-anchor="middle">BQL and NAPI</text>

  <path d="M270 251 H298" class="arrow" />
  <path d="M510 251 H538" class="arrow" />
  <path d="M750 251 H778" class="arrow" />

  <rect x="318" y="334" width="174" height="42" rx="14" fill="#d6ecf7" stroke="#2f6079" stroke-width="2" />
  <text x="405" y="362" class="pill" fill="#24495d" text-anchor="middle">sock_ops / sk_msg</text>

  <rect x="561" y="334" width="168" height="42" rx="14" fill="#e5efe0" stroke="#617856" stroke-width="2" />
  <text x="645" y="362" class="pill" fill="#43553d" text-anchor="middle">tc ingress / egress</text>

  <rect x="824" y="334" width="152" height="42" rx="14" fill="#faead9" stroke="#956232" stroke-width="2" />
  <text x="900" y="362" class="pill" fill="#70431a" text-anchor="middle">driver + XDP</text>

  <rect x="300" y="410" width="480" height="108" class="card" fill="#ddd0bf" />
  <text x="540" y="455" font-family="Georgia, serif" font-size="30" fill="#433228" text-anchor="middle">Physical Network</text>
  <text x="540" y="486" class="body-dark" text-anchor="middle">switch queues, ECN marks, drops, and RTT inflation</text>

  <path d="M900 312 V392" class="arrow" />

  <text x="70" y="586" class="section">Hook points and feedback</text>

  <rect x="60" y="616" width="225" height="132" class="card" fill="#434767" />
  <text x="172.5" y="670" class="head" text-anchor="middle">Receive Path</text>
  <text x="172.5" y="703" class="body" text-anchor="middle">driver, XDP, TC ingress</text>

  <rect x="315" y="616" width="225" height="132" class="card" fill="#587f82" />
  <text x="427.5" y="670" class="head" text-anchor="middle">eBPF Hooks</text>
  <text x="427.5" y="703" class="body" text-anchor="middle">XDP, tc, sock_ops</text>

  <rect x="570" y="616" width="225" height="132" class="card" fill="#83457a" />
  <text x="682.5" y="670" class="head" text-anchor="middle">Observability</text>
  <text x="682.5" y="703" class="body" text-anchor="middle">tracepoints, kprobes</text>

  <rect x="825" y="616" width="225" height="132" class="card" fill="#7d251e" />
  <text x="937.5" y="670" class="head" text-anchor="middle">Control Signals</text>
  <text x="937.5" y="703" class="body" text-anchor="middle">loss, ECN, backlog</text>

  <path d="M285 682 H313" class="arrow" />
  <path d="M540 682 H568" class="arrow" />
  <path d="M795 682 H823" class="arrow" />

  <path d="M172 520 V616" stroke="#253540" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <text x="70" y="800" class="small-dark">Read the queue first, then choose the hook.</text>
  <text x="70" y="824" class="small-dark">qdisc pressure and NIC pressure are different problems.</text>
</svg>
