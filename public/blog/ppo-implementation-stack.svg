<svg width="1200" height="840" viewBox="0 0 1200 840" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="840" fill="#F6F1E8"/>
  <rect width="1200" height="840" fill="#F6F1E8"/>
  <rect x="70" y="70" width="1060" height="740" rx="28" fill="#FFFDFC" stroke="#1F2937" stroke-width="2"/>

  <text x="100" y="128" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic">
    What People Call “PPO” in Practice
  </text>
  <text x="100" y="165" fill="#4B5563" font-family="Inter, Arial, sans-serif" font-size="22">
    The clipped objective matters, but it sits inside
  </text>
  <text x="100" y="192" fill="#4B5563" font-family="Inter, Arial, sans-serif" font-size="22">
    a much larger training stack.
  </text>

  <rect x="110" y="215" width="980" height="78" rx="18" fill="#D7E8F6" stroke="#1F2937" stroke-width="2"/>
  <text x="140" y="268" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">
    1. Paper-level idea: clipped surrogate objective
  </text>

  <rect x="110" y="315" width="980" height="78" rx="18" fill="#E6F0D7" stroke="#1F2937" stroke-width="2"/>
  <text x="140" y="354" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">
    2. Advantage estimation
  </text>
  <text x="140" y="384" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    GAE, bootstrapping choices, value targets
  </text>

  <rect x="90" y="415" width="1020" height="108" rx="18" fill="#FBE4B8" stroke="#1F2937" stroke-width="2"/>
  <text x="125" y="454" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">
    3. Normalization and stabilization
  </text>
  <text x="125" y="484" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    reward scaling, observation normalization,
  </text>
  <text x="125" y="512" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    normalization, gradient clipping
  </text>

  <rect x="90" y="534" width="1020" height="142" rx="18" fill="#F7D7D7" stroke="#1F2937" stroke-width="2"/>
  <text x="125" y="572" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">
    4. Optimization and code defaults
  </text>
  <text x="125" y="612" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    learning-rate annealing, minibatch order,
  </text>
  <text x="125" y="642" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    epoch count, initialization, entropy
  </text>
  <text x="125" y="670" fill="#374151" font-family="Inter, Arial, sans-serif" font-size="22">
    and value coefficients
  </text>

  <path d="M600 684 L600 714" stroke="#1F2937" stroke-width="4" stroke-linecap="round"/>
  <path d="M586 700 L600 716 L614 700" stroke="#1F2937" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="190" y="726" width="820" height="98" rx="18" fill="#1F2937"/>
  <text x="260" y="774" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">
    Benchmark performance
  </text>
  <text x="260" y="803" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">
    people later called “PPO”
  </text>
</svg>
