<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" role="img" aria-labelledby="title desc">
  <title id="title">What people call PPO in practice</title>
  <desc id="desc">A stacked diagram showing the clipped PPO objective, advantage estimation, normalization and stabilization, optimization defaults, and the benchmark performance people later called PPO.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4eee6"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <style>
      .title { font: italic 700 36px Georgia, serif; fill: #1f2737; }
      .subtitle { font: 500 20px Arial, sans-serif; fill: #4f5c6a; }
      .card-title { font: 700 24px Arial, sans-serif; fill: #192234; }
      .card-copy { font: 500 18px Arial, sans-serif; fill: #465261; }
      .result { font: 700 24px Arial, sans-serif; fill: #f7f9fc; }
    </style>
  </defs>

  <rect width="1080" height="760" fill="url(#bg)" />

  <text x="72" y="74" class="title">What People Call "PPO" in Practice</text>
  <text x="72" y="108" class="subtitle">The clipped objective matters, but benchmark behavior comes from a larger training recipe wrapped around it.</text>

  <rect x="70" y="154" width="940" height="84" rx="20" fill="#d7e6f5" stroke="#233246" stroke-opacity="0.18" stroke-width="2" />
  <text x="104" y="206" class="card-title">1. Paper-level idea: clipped surrogate objective</text>

  <rect x="70" y="264" width="940" height="98" rx="20" fill="#e4efd3" stroke="#233246" stroke-opacity="0.18" stroke-width="2" />
  <text x="104" y="312" class="card-title">2. Advantage estimation</text>
  <text x="104" y="340" class="card-copy">GAE, bootstrapping choices, and value targets</text>

  <rect x="70" y="388" width="940" height="120" rx="20" fill="#f8e0a9" stroke="#233246" stroke-opacity="0.18" stroke-width="2" />
  <text x="104" y="438" class="card-title">3. Normalization and stabilization</text>
  <text x="104" y="468" class="card-copy">observation normalization, advantage normalization,</text>
  <text x="104" y="496" class="card-copy">reward scaling, gradient clipping</text>

  <rect x="70" y="534" width="940" height="130" rx="20" fill="#efd0d0" stroke="#233246" stroke-opacity="0.18" stroke-width="2" />
  <text x="104" y="584" class="card-title">4. Optimization and code defaults</text>
  <text x="104" y="614" class="card-copy">learning-rate annealing, minibatch order, epoch count,</text>
  <text x="104" y="642" class="card-copy">entropy bonuses, value-loss handling, initialization</text>

  <path d="M540 664 V708" stroke="#233246" stroke-width="4" stroke-linecap="round" />
  <path d="M526 694 L540 710 L554 694" stroke="#233246" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <rect x="245" y="700" width="590" height="48" rx="16" fill="#222d3d" />
  <text x="540" y="731" class="result" text-anchor="middle">Benchmark performance people later called "PPO"</text>
</svg>
