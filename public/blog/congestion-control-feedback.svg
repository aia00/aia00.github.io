<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="680" viewBox="0 0 1080 680" role="img" aria-labelledby="title desc">
  <title id="title">Congestion feedback loops for Linux and NIC controllers</title>
  <desc id="desc">A diagram showing queues building up, three feedback signals, the controllers that react to them, and the host or NIC actuation that reduces sending pressure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4eee6"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #1f2b33; }
      .subtitle { font: 500 20px Arial, sans-serif; fill: #52626c; }
      .head { font: 700 26px Georgia, serif; fill: #ffffff; }
      .body { font: 500 18px Arial, sans-serif; fill: #eef5fb; }
      .body-dark { font: 500 18px Arial, sans-serif; fill: #7e5028; }
      .card { rx: 18; ry: 18; stroke: #21313d; stroke-opacity: 0.18; stroke-width: 2; }
      .arrow { stroke: #253540; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #c57a2e; stroke-width: 6; fill: none; stroke-dasharray: 14 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#253540" />
    </marker>
  </defs>

  <rect width="1080" height="680" fill="url(#bg)" />

  <text x="70" y="70" class="title">Which signal the controller watches changes how early it reacts</text>
  <text x="70" y="106" class="subtitle">Loss-based control waits longer. ECN reacts earlier.</text>
  <text x="70" y="132" class="subtitle">Model-based control tracks bandwidth and RTprop directly.</text>

  <rect x="70" y="220" width="220" height="138" class="card" fill="#8a592c" />
  <text x="180" y="275" class="head" text-anchor="middle">Queues Build Up</text>
  <text x="180" y="308" class="body" text-anchor="middle">qdisc backlog</text>
  <text x="180" y="336" class="body" text-anchor="middle">NIC ring pressure</text>

  <rect x="340" y="128" width="220" height="100" class="card" fill="#355861" />
  <text x="450" y="170" class="head" text-anchor="middle">Loss</text>
  <text x="450" y="198" class="body" text-anchor="middle">tail drop, RTO, dup ACKs</text>

  <rect x="340" y="262" width="220" height="100" class="card" fill="#56775d" />
  <text x="450" y="304" class="head" text-anchor="middle">ECN Marks</text>
  <text x="450" y="332" class="body" text-anchor="middle">queue or switch marking</text>

  <rect x="340" y="396" width="220" height="100" class="card" fill="#68578c" />
  <text x="450" y="438" class="head" text-anchor="middle">RTT Inflation</text>
  <text x="450" y="466" class="body" text-anchor="middle">queueing delay above min RTT</text>

  <rect x="610" y="128" width="220" height="100" class="card" fill="#2d3648" />
  <text x="720" y="170" class="head" text-anchor="middle">CUBIC</text>
  <text x="720" y="198" class="body" text-anchor="middle">loss-driven TCP growth</text>

  <rect x="610" y="262" width="220" height="100" class="card" fill="#1f676d" />
  <text x="720" y="304" class="head" text-anchor="middle">DCTCP / DCQCN</text>
  <text x="720" y="332" class="body" text-anchor="middle">ECN-sensitive reduction</text>

  <rect x="610" y="396" width="220" height="100" class="card" fill="#516b8e" />
  <text x="720" y="438" class="head" text-anchor="middle">BBR</text>
  <text x="720" y="462" class="body" text-anchor="middle">bandwidth plus</text>
  <text x="720" y="486" class="body" text-anchor="middle">RTprop model</text>

  <rect x="865" y="204" width="180" height="170" class="card" fill="#9a4544" />
  <text x="955" y="258" class="head" text-anchor="middle">Actuation</text>
  <text x="955" y="294" class="body" text-anchor="middle">cwnd</text>
  <text x="955" y="324" class="body" text-anchor="middle">pacing rate</text>
  <text x="955" y="354" class="body" text-anchor="middle">NIC rate adjustment</text>

  <path d="M290 289 L338 178" class="arrow" />
  <path d="M290 289 L338 312" class="arrow" />
  <path d="M290 289 L338 446" class="arrow" />

  <path d="M560 178 H608" class="arrow" />
  <path d="M560 312 H608" class="arrow" />
  <path d="M560 446 H608" class="arrow" />

  <path d="M830 178 L863 248" class="arrow" />
  <path d="M830 312 L863 294" class="arrow" />
  <path d="M830 446 L863 340" class="arrow" />

  <path d="M955 374 C950 474, 786 584, 470 584 C260 584, 170 500, 170 358" class="loop" />
  <text x="585" y="626" class="body-dark" text-anchor="middle">Controllers reduce sending pressure so the queue can drain before latency or drops dominate.</text>
</svg>
