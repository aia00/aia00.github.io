<svg width="1600" height="1320" viewBox="0 0 1600 1320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1320" fill="#F5F0E6"/>
  <rect x="44" y="38" width="1512" height="1244" rx="34" fill="#FBFAF7" stroke="#243042" stroke-width="4"/>

  <text x="84" y="112" fill="#192234" font-family="Georgia, serif" font-size="62" font-style="italic">Three Different Layers, Three Different Jobs</text>
  <text x="88" y="164" fill="#314560" font-family="Arial, Helvetica, sans-serif" font-size="28">These components often appear in one post-training environment because they solve</text>
  <text x="88" y="198" fill="#314560" font-family="Arial, Helvetica, sans-serif" font-size="28">different bottlenecks at different layers of the stack.</text>

  <rect x="84" y="244" width="1432" height="286" rx="28" fill="#DDEAF6" stroke="#243042" stroke-width="4"/>
  <line x1="470" y1="278" x2="470" y2="496" stroke="#8AA7C5" stroke-width="3"/>
  <text x="124" y="332" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">verl</text>
  <text x="124" y="374" fill="#284766" font-family="Arial, Helvetica, sans-serif" font-size="30">post-training runtime</text>
  <text x="520" y="328" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Question</text>
  <text x="520" y="368" fill="#243F5B" font-family="Arial, Helvetica, sans-serif" font-size="29">How is the RL post-training job organized</text>
  <text x="520" y="402" fill="#243F5B" font-family="Arial, Helvetica, sans-serif" font-size="29">across workers and algorithmic steps?</text>
  <text x="520" y="446" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Focus</text>
  <text x="520" y="486" fill="#243F5B" font-family="Arial, Helvetica, sans-serif" font-size="29">actor / rollout / reward topology, sampling loop,</text>
  <text x="520" y="520" fill="#243F5B" font-family="Arial, Helvetica, sans-serif" font-size="29">updates, and synchronization</text>

  <rect x="84" y="566" width="1432" height="316" rx="28" fill="#E5F0D7" stroke="#243042" stroke-width="4"/>
  <line x1="470" y1="600" x2="470" y2="848" stroke="#9EB88A" stroke-width="3"/>
  <text x="124" y="654" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700">vLLM</text>
  <text x="124" y="696" fill="#335A38" font-family="Arial, Helvetica, sans-serif" font-size="30">rollout and serving engine</text>
  <text x="520" y="650" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Question</text>
  <text x="520" y="690" fill="#35533C" font-family="Arial, Helvetica, sans-serif" font-size="29">How are rollouts generated efficiently</text>
  <text x="520" y="724" fill="#35533C" font-family="Arial, Helvetica, sans-serif" font-size="29">during autoregressive decoding?</text>
  <text x="520" y="770" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Focus</text>
  <text x="520" y="810" fill="#35533C" font-family="Arial, Helvetica, sans-serif" font-size="29">continuous batching, KV-cache paging,</text>
  <text x="520" y="844" fill="#35533C" font-family="Arial, Helvetica, sans-serif" font-size="29">decode throughput, engine scheduling, and backend choice</text>

  <rect x="84" y="918" width="1432" height="316" rx="28" fill="#F5DFC2" stroke="#243042" stroke-width="4"/>
  <line x1="470" y1="952" x2="470" y2="1200" stroke="#C9A57A" stroke-width="3"/>
  <text x="124" y="1006" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">FlashAttention</text>
  <text x="124" y="1048" fill="#6B4A24" font-family="Arial, Helvetica, sans-serif" font-size="30">attention kernel family</text>
  <text x="520" y="1002" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Question</text>
  <text x="520" y="1042" fill="#6B4A24" font-family="Arial, Helvetica, sans-serif" font-size="29">How is attention computed efficiently</text>
  <text x="520" y="1076" fill="#6B4A24" font-family="Arial, Helvetica, sans-serif" font-size="29">inside one model pass?</text>
  <text x="520" y="1122" fill="#0F1C33" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Focus</text>
  <text x="520" y="1162" fill="#6B4A24" font-family="Arial, Helvetica, sans-serif" font-size="29">IO-aware exact attention, faster forward/backward,</text>
  <text x="520" y="1196" fill="#6B4A24" font-family="Arial, Helvetica, sans-serif" font-size="29">especially valuable in training and prefill-heavy regimes</text>

  <rect x="244" y="1242" width="1112" height="60" rx="20" fill="#233042"/>
  <text x="800" y="1282" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">One post-training stack often needs all three layers at once.</text>
</svg>
